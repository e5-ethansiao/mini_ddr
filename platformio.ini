[env:esp32-c3-devkitc-04]
platform = espressif32
board = esp32dev
framework = arduino
monitor_speed = 115200
lib_deps = 
	bodmer/TFT_eSPI @ ^2.5.43
	adafruit/Adafruit NeoPixel @ ^1.12.0
	adafruit/Adafruit BusIO @ ^1.16.1
build_flags =
	-DUSER_SETUP_LOADED=1
	-DST7735_DRIVER
	-DTFT_WIDTH=128
	-DTFT_HEIGHT=160
	-DST7735_REDTAB
	-DTFT_CS=5
	-DTFT_DC=2
	-DTFT_RST=-1
	-DTFT_MOSI=23
	-DTFT_SCLK=18
	-DSPI_FREQ=20000000
	-DLOAD_GLCD=1
	-DLOAD_FONT2=1
	-DLOAD_FONT4=1
	-DLOAD_FONT6=1
	-DLOAD_FONT7=1
	-DLOAD_FONT8=1
	-DLOAD_GFXFF=1
	-DSMOOTH_FONT=1